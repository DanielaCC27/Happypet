name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# Secrets GitHub (Settings > Secrets and variables > Actions):
#   EC2_*           — despliegue (existentes)
#   TESTRAIL_URL    — base URL del servidor TestRail
#   TESTRAIL_USER   — email / usuario API
#   TESTRAIL_API_KEY — clave API
#   TESTRAIL_RUN_ID — id numerico del Test Run donde registrar resultados
# Si faltan secretos TestRail o falla la API, los tests y el deploy continuan (errores solo en logs [TestRail]).

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas automatizadas (reporte TestRail)
        shell: bash
        env:
          TESTRAIL_REPORT_RESULTS: "true"
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_RUN_ID: ${{ secrets.TESTRAIL_RUN_ID }}
        run: |
          set -euo pipefail
          TEST_START=$(date +%s)
          echo "::group::[TestRail] Inicio de reporte en CI"
          echo "[TestRail] TESTRAIL_REPORT_RESULTS=${TESTRAIL_REPORT_RESULTS}"
          if [[ -n "${TESTRAIL_URL:-}" ]]; then
            echo "[TestRail] TESTRAIL_URL definido (valor oculto en logs)"
          else
            echo "[TestRail] TESTRAIL_URL vacio: no se llamara a la API (definir secret en el repositorio)"
          fi
          if [[ -n "${TESTRAIL_RUN_ID:-}" ]]; then
            echo "[TestRail] TESTRAIL_RUN_ID definido"
          else
            echo "[TestRail] TESTRAIL_RUN_ID vacio: integracion inactiva hasta configurar secret"
          fi
          echo "[TestRail] Mapeo FQCN#metodo -> TC-*: src/test/resources/testrail-automated-mapping.properties"
          echo "[TestRail] IDs numericos (requeridos para enviar): src/test/resources/testrail-case-ids.properties"
          if [[ -f src/test/resources/testrail-case-ids.properties ]]; then
            MAP_COUNT=$(grep -cE '^[[:space:]]*TC-[^[:space:]#=]+[[:space:]]*=' src/test/resources/testrail-case-ids.properties || true)
            echo "[TestRail] Lineas con TC-*= en case-ids (aprox. casos con id numerico): ${MAP_COUNT:-0}"
          fi
          echo "[TestRail] Errores de red/API se registran como warn y no fallan el job si los tests pasan."
          echo "::endgroup::"

          # Capturar MVN_EXIT aunque falle el pipeline (set -e + pipefail saldría antes sin esto).
          set +e
          set -o pipefail
          ./mvnw -B -ntp test 2>&1 | tee mvn-test.log
          MVN_EXIT=${PIPESTATUS[0]}
          set -e

          echo "::group::[TestRail] Lineas registradas / errores manejados (grep en log Maven)"
          set +o pipefail
          if grep -q '\[TestRail\]' mvn-test.log; then
            grep '\[TestRail\]' mvn-test.log | tail -n 500
          else
            echo "[TestRail] Sin lineas [TestRail] en la salida: suele indicar case_ids vacios, secretos ausentes o nivel de log."
          fi
          set -o pipefail
          echo "[TestRail] Codigo salida Maven (tests): ${MVN_EXIT}"
          echo "::endgroup::"

          TEST_END=$(date +%s)
          chmod +x scripts/ci-test-summary.sh || true
          set +e
          bash scripts/ci-test-summary.sh "${TEST_START}" "${TEST_END}" "${MVN_EXIT}" mvn-test.log
          SUMMARY_EXIT=$?
          set -e
          if [[ "${SUMMARY_EXIT}" -ne 0 ]]; then
            echo "::error::ci-test-summary.sh falló con código ${SUMMARY_EXIT}. Revisa el grupo 'ci-test-summary' en el log; un script .sh en UTF-16 en Linux suele impedir crear reports/ y los artifacts quedan vacíos."
          fi

          exit "${MVN_EXIT}"

      - name: Subir resumen de pruebas (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-summary
          path: |
            reports/test-execution-summary.md
            reports/test-execution-summary.html
          if-no-files-found: warn

      - name: Compilar proyecto
        run: ./mvnw clean package -DskipTests

      # En EC2: compilar, matar JAR anterior, arrancar con nohup + monitor mode + disown
      # y salir. Así el cierre de la sesión SSH no arrastra SIGTERM al Java (evita 143).
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 45m
          request_pty: false
          script: |
            printf '%s\n' \
              'set -euo pipefail' \
              'cd /home/ubuntu/Happypet' \
              'git pull origin main' \
              'chmod +x mvnw' \
              './mvnw clean package -DskipTests' \
              'pkill -f "[j]ava -jar .*happypet-0.0.1-SNAPSHOT.jar" || true' \
              'sleep 2' \
              'set -m' \
              'nohup java -jar target/happypet-0.0.1-SNAPSHOT.jar --spring.profiles.active=aws > app.log 2>&1 < /dev/null &' \
              'disown' \
              'set +m' \
              'sleep 3' \
              'pgrep -f "[j]ava -jar .*happypet-0.0.1-SNAPSHOT.jar" > /dev/null' \
              'exit 0' \
              > /tmp/happypet-deploy.sh
            chmod +x /tmp/happypet-deploy.sh
            exec /bin/bash /tmp/happypet-deploy.sh
