<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:inline="none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facturación - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light" data-authenticated="true">

<header th:replace="~{fragments/site-header :: header}"></header>

<main id="main-content" class="catalog-container flex-grow-1 py-4 pb-5">
    <nav class="small text-muted mb-2" aria-label="Pasos de compra">
        1. Entrega → 2. Pago → <span class="fw-semibold text-dark">3. Facturación y envío</span>
    </nav>
    <h1 class="h4 fw-bold mb-3">Datos para la factura</h1>
    <p class="text-muted small mb-4">Elige departamento y municipio de Colombia y completa la dirección de entrega; se usará también para la facturación.</p>

    <!-- Municipios: URL API (JSON UTF-8) + respaldo archivo estático + JSON en página -->
    <div id="checkout-ubicacion-config" class="d-none"
         th:attr="data-api-json=@{/api/ubicaciones/colombia}, data-fallback-json=@{/data/colombia.min.json}"></div>
    <script type="application/json" id="checkout-colombia-json" th:utext="${colombiaUbicacionesJson}"></script>

    <div th:if="${errorCheckout}" class="alert alert-danger" th:text="${errorCheckout}"></div>

    <div class="row g-4">
        <div class="col-lg-7">
            <form th:action="@{/checkout/facturacion}" th:object="${facturacion}" method="post" class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tipo de documento</label>
                            <select class="form-select" th:field="*{facturacionTipoDocumento}" required>
                                <option value="" disabled>Selecciona</option>
                                <option th:each="t : ${tiposDocumento}" th:value="${t}" th:text="${t}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('facturacionTipoDocumento')}"
                                 th:errors="*{facturacionTipoDocumento}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Número de documento</label>
                            <input type="text" class="form-control" th:field="*{facturacionDocumento}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('facturacionDocumento')}"
                                 th:errors="*{facturacionDocumento}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{facturacionNombre}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('facturacionNombre')}"
                                 th:errors="*{facturacionNombre}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" th:field="*{facturacionApellidos}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('facturacionApellidos')}"
                                 th:errors="*{facturacionApellidos}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Departamento (envío)</label>
                            <select class="form-select" id="departamentoEnvio" th:field="*{departamentoEnvio}" required>
                                <option value="">Seleccione departamento</option>
                                <option th:each="d : ${departamentosColombia}" th:value="${d}" th:text="${d}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('departamentoEnvio')}"
                                 th:errors="*{departamentoEnvio}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Municipio (envío)</label>
                            <select class="form-select" id="municipioEnvio" th:field="*{municipioEnvio}" required
                                    th:attr="data-initial-municipio=*{municipioEnvio}"
                                    aria-describedby="municipio-help">
                                <option value="">Primero elige un departamento</option>
                            </select>
                            <p id="municipio-help" class="form-text small text-muted mb-0">Los municipios aparecen al seleccionar el departamento.</p>
                            <div class="text-danger small" th:if="${#fields.hasErrors('municipioEnvio')}"
                                 th:errors="*{municipioEnvio}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección detallada (calle, número, barrio, referencias)</label>
                            <textarea class="form-control" rows="2" th:field="*{direccionEnvio}" required
                                      placeholder="Ej: Carrera 45 #12-30, Barrio Centro, apartamento 201…"></textarea>
                            <div class="text-danger small" th:if="${#fields.hasErrors('direccionEnvio')}"
                                 th:errors="*{direccionEnvio}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" th:field="*{facturacionEmail}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('facturacionEmail')}"
                                 th:errors="*{facturacionEmail}"></div>
                        </div>
                    </div>
                    <div class="hp-checkout-actions mt-4 pt-3 border-top">
                        <a class="btn btn-outline-secondary rounded-pill" th:href="@{/checkout/pago}">Volver</a>
                        <button type="submit" class="btn btn-success rounded-pill">Finalizar compra</button>
                    </div>
                </div>
            </form>
        </div>
        <div class="col-lg-5">
            <div th:replace="~{fragments/checkout-sidebar :: sidebar}"></div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/checkout-ubicacion.js}"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
