<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:inline="none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedido creado - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light" data-authenticated="true">

<header th:replace="~{fragments/site-header :: header}"></header>

<main id="main-content" class="catalog-container flex-grow-1 py-4 pb-5">
    <div class="card border-0 shadow-sm mx-auto hp-checkout-success" style="max-width: 520px;">
        <div class="card-body p-4 p-md-5 text-center">
            <div class="hp-checkout-success__icon mb-3" role="img" aria-label="Correcto">
                <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 52 52" fill="none" aria-hidden="true">
                    <circle cx="26" cy="26" r="24" fill="rgba(22, 163, 74, 0.12)" stroke="#16a34a" stroke-width="2"/>
                    <path d="M16 27.5l6.5 6.5L36 20" stroke="#16a34a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="h4 fw-bold mb-2 text-success">Pedido creado exitosamente</h1>
            <p class="text-muted mb-4">
                Tu pedido <strong th:text="|#${pedidoId}|">#0</strong> quedó registrado.
                Te enviamos un correo con <strong>facturación</strong>, <strong>envío</strong>, <strong>fecha</strong>
                y <strong>franja de entrega</strong> (8:00–18:00).
            </p>
            <div class="hp-btn-group hp-btn-group--equal justify-content-center mx-auto" style="max-width: 420px;">
                <a class="btn btn-outline-secondary rounded-pill" th:href="@{/home}">Seguir comprando</a>
                <a class="btn btn-success rounded-pill" th:href="@{/pedidos/{id}(id=${pedidoId})}">Ver mis pedidos</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
