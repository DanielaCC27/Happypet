<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catálogo - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<!-- GLOBAL NAVBAR -->
<nav class="navbar navbar-expand-lg global-nav catalog-navbar">
    <div class="container-fluid hp-nav-container">
        <a class="navbar-brand fw-bold catalog-brand" th:href="@{/}">HappyPet 🐾</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" th:href="@{/productos}">Tienda</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/carrito}">Carrito</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/usuarios/perfil}">Mi Perfil</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/productos/nuevo}">Agregar producto</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- SEARCH + CATEGORIES -->
<div class="catalog-search-bar bg-white border-bottom shadow-sm py-4">
    <div class="catalog-container">
        <form th:action="@{/productos}" method="get" class="search-bar">
            <input type="hidden" name="categoria" th:value="${categoria}">
            <input class="search-bar-input" type="text" name="q"
                   placeholder="Buscar comida, juguetes, accesorios..."
                   th:value="${q}"
                   aria-label="Buscar productos">
            <button class="btn btn-primary rounded-pill ms-2" type="submit" aria-label="Buscar">Buscar</button>
        </form>
        <div class="category-bar">
            <a th:href="@{/productos}" class="category-button text-decoration-none"
               th:classappend="${categoria == null} ? 'category-button-active' : ''">Todas</a>
            <a th:href="@{/productos(categoria='Alimentación')}" class="category-button text-decoration-none"
               th:classappend="${categoria == 'Alimentación'} ? 'category-button-active' : ''">Alimentación</a>
            <a th:href="@{/productos(categoria='Higiene')}" class="category-button text-decoration-none"
               th:classappend="${categoria == 'Higiene'} ? 'category-button-active' : ''">Higiene</a>
            <a th:href="@{/productos(categoria='Juguetes')}" class="category-button text-decoration-none"
               th:classappend="${categoria == 'Juguetes'} ? 'category-button-active' : ''">Juguetes</a>
            <a th:href="@{/productos(categoria='Accesorios')}" class="category-button text-decoration-none"
               th:classappend="${categoria == 'Accesorios'} ? 'category-button-active' : ''">Accesorios</a>
        </div>
    </div>
</div>

<main class="catalog-container flex-grow-1 py-4 mt-4">
    <div th:if="${mensajeCarrito}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
        <span th:text="${mensajeCarrito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0 fw-bold">Catálogo de Productos</h2>
        <p class="mb-0 small text-muted" th:if="${q != null and !#strings.isEmpty(q)}"
           th:text="'Resultados para &quot;' + ${q} + '&quot;'"></p>
    </div>

    <!-- PRODUCT GRID -->
    <div class="product-grid mt-4" th:if="${productos != null and !productos.isEmpty()}">
        <article th:each="producto : ${productos}" class="product-card">
            <a th:href="@{/productos/{id}(id=${producto.id})}" class="product-card__image-link">
                <div class="product-card__image-container">
                    <img th:src="${(producto.imagenUrl != null and !#strings.isEmpty(producto.imagenUrl)) ? producto.imagenUrl : 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg/400px-8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg'}"
                         th:alt="${producto.nombre != null ? 'Imagen de ' + producto.nombre : 'Producto'}"
                         class="product-card__img"
                         loading="lazy"
                         onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg/400px-8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg';">
                </div>
            </a>
            <div class="product-card__body">
                <a th:href="@{/productos/{id}(id=${producto.id})}" class="product-card__title-link">
                    <h3 class="product-card__title" th:text="${producto.nombre != null ? producto.nombre : 'Producto'}">Nombre</h3>
                </a>
                <span class="product-card__category" th:text="${producto.categoria != null ? producto.categoria : ''}"></span>
                <p class="product-card__price">
                    <span class="product-card__price-label">Precio:</span>
                    <span class="product-card__price-value">$ <span th:text="${#numbers.formatInteger(producto.precio, 1)}"></span></span>
                </p>
                <form th:action="@{/carrito/agregar/{id}(id=${producto.id})}" method="post" class="product-card__form">
                    <button type="submit" class="product-card__btn-cart">
                        <svg class="product-card__btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                        </svg>
                        Agregar al carrito
                    </button>
                </form>
            </div>
            <div sec:authorize="hasRole('ADMIN')" class="product-card__admin">
                <a class="product-card__admin-link product-card__admin-link--edit" th:href="@{'/productos/editar/' + ${producto.id}}">Editar</a>
                <a class="product-card__admin-link product-card__admin-link--delete" th:href="@{'/productos/eliminar/' + ${producto.id}}">Eliminar</a>
            </div>
        </article>
    </div>
    <p th:if="${productos == null or productos.isEmpty()}" class="text-muted py-4 mb-0 text-center">No hay productos para mostrar.</p>
</main>

<footer class="bg-light border-top mt-auto py-3 mb-0">
    <div class="catalog-container text-center text-muted small">© HappyPet — Productos para tu mascota</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
