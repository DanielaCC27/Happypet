<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Producto - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light"
      th:with="authenticatedUi=${#authentication != null and #authentication.name != null and #authentication.name != 'anonymousUser'}"
      th:attr="data-authenticated=${authenticatedUi}">

<header th:replace="~{fragments/site-header :: header}"></header>

<main id="main-content" class="catalog-container flex-grow-1 py-4 mt-4">
    <div class="form-card">
        <h2 class="section-title" th:text="${producto.id == null} ? 'Crear Producto' : 'Editar Producto'"></h2>
        <form th:action="@{/productos/guardar(id=${producto.id})}" method="post">
            <input type="hidden" name="id" th:value="${producto.id}">
            <label class="text-label d-block">Nombre</label>
            <input type="text" name="nombre" th:value="${producto.nombre}" required class="mb-3">
            <label class="text-label d-block">Descripción</label>
            <input type="text" name="descripcion" th:value="${producto.descripcion}" required class="mb-3">
            <label class="text-label d-block">Precio</label>
            <input type="number" step="0.01" name="precio" th:value="${producto.precio}" required class="mb-3">
            <label class="text-label d-block">Stock</label>
            <input type="number" name="stock" th:value="${producto.stock}" required class="mb-3">
            <label class="text-label d-block">Categoría</label>
            <select name="categoria" required class="mb-3">
                <option value="" disabled th:if="${producto.categoria == null}" selected>Selecciona una categoría</option>
                <option value="Alimentación" th:selected="${producto.categoria == 'Alimentación'}">Alimentación</option>
                <option value="Higiene" th:selected="${producto.categoria == 'Higiene'}">Higiene</option>
                <option value="Juguetes" th:selected="${producto.categoria == 'Juguetes'}">Juguetes</option>
                <option value="Accesorios" th:selected="${producto.categoria == 'Accesorios'}">Accesorios</option>
            </select>
            <label class="text-label d-block">Imagen (URL)</label>
            <input type="text" name="imagenUrl" th:value="${producto.imagenUrl}" class="mb-3">
            <button type="submit" class="btn btn-primary rounded-pill mt-4">Guardar producto</button>
        </form>
        <p class="mt-4 mb-0"><a th:href="@{/home}" class="btn btn-outline-primary rounded-pill">Volver al catálogo</a></p>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
