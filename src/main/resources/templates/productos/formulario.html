<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Producto - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav class="navbar navbar-expand-lg global-nav">
    <div class="container-fluid hp-nav-container">
        <a class="navbar-brand fw-bold" th:href="@{/}">HappyPet 🐾</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" th:href="@{/productos}">Tienda</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/carrito}">Carrito</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/usuarios/perfil}">Mi Perfil</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/productos/nuevo}">Agregar producto</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="app-container py-5">
    <div class="form-card">
        <h2 class="section-title" th:text="${producto.id == null} ? 'Crear Producto' : 'Editar Producto'"></h2>
        <form th:action="@{/productos/guardar(id=${producto.id})}" method="post">
            <input type="hidden" name="id" th:value="${producto.id}">
            <label class="text-label d-block">Nombre</label>
            <input type="text" name="nombre" th:value="${producto.nombre}" required class="mb-3">
            <label class="text-label d-block">Descripción</label>
            <input type="text" name="descripcion" th:value="${producto.descripcion}" required class="mb-3">
            <label class="text-label d-block">Precio</label>
            <input type="number" step="0.01" name="precio" th:value="${producto.precio}" required class="mb-3">
            <label class="text-label d-block">Stock</label>
            <input type="number" name="stock" th:value="${producto.stock}" required class="mb-3">
            <label class="text-label d-block">Categoría</label>
            <select name="categoria" required class="mb-3">
                <option value="" disabled th:if="${producto.categoria == null}" selected>Selecciona una categoría</option>
                <option value="Alimentación" th:selected="${producto.categoria == 'Alimentación'}">Alimentación</option>
                <option value="Higiene" th:selected="${producto.categoria == 'Higiene'}">Higiene</option>
                <option value="Juguetes" th:selected="${producto.categoria == 'Juguetes'}">Juguetes</option>
                <option value="Accesorios" th:selected="${producto.categoria == 'Accesorios'}">Accesorios</option>
            </select>
            <label class="text-label d-block">Imagen (URL)</label>
            <input type="text" name="imagenUrl" th:value="${producto.imagenUrl}" class="mb-3">
            <button type="submit" class="btn btn-primary rounded-pill mt-4">Guardar producto</button>
        </form>
        <p class="mt-4 mb-0"><a th:href="@{/productos}" class="btn btn-outline-primary rounded-pill">Volver al catálogo</a></p>
    </div>
</div>

<footer class="bg-light border-top mt-auto py-3">
    <div class="app-container text-center text-muted small">© HappyPet — Productos para tu mascota</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
