<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${(producto.nombre != null ? producto.nombre : 'Producto') + ' - HappyPet'}">Detalle - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light"
      th:with="authenticatedUi=${#authentication != null and #authentication.name != null and #authentication.name != 'anonymousUser'}"
      th:attr="data-authenticated=${authenticatedUi}">
<header th:replace="~{fragments/site-header :: header}"></header>

<!-- Toast flotante: éxito al crear/editar producto (flash desde el servidor) -->
<div th:if="${flashSuccess}" class="toast-container position-fixed top-0 end-0 p-3 product-flash-toast-wrap" role="region" aria-label="Notificación">
    <div id="productoSuccessToast"
         class="toast product-success-toast shadow-lg border-0"
         role="alert"
         aria-live="polite"
         data-bs-autohide="true"
         data-bs-delay="5000">
        <div class="toast-body">
            <div class="text-center">
                <div class="product-success-toast__icon mb-3" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
                    </svg>
                </div>
                <p class="mb-0 fw-semibold product-success-toast__text" th:text="${flashSuccess}">Producto creado exitosamente.</p>
            </div>
        </div>
    </div>
</div>

<main id="main-content" class="app-container mt-5 mb-4">
    <a th:href="@{/home}" class="d-inline-block mb-4 text-decoration-none small link-muted">
        ← Volver al catálogo
    </a>

    <div class="row g-4 mt-4 mb-4">
        <!-- LEFT: Large product image -->
        <div class="col-lg-6 col-md-6">
            <div class="product-image-wrapper p-4">
                <img th:src="${(producto.imagenUrl != null and !#strings.isEmpty(producto.imagenUrl)) ? producto.imagenUrl : 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg/400px-8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg'}"
                     th:alt="${producto.nombre != null ? 'Imagen de ' + producto.nombre : 'Producto'}"
                     class="product-image img-fluid"
                     onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg/400px-8kg_Beneful_Original_Dog_Food_Bag_%2833239682124%29.jpg';">
            </div>
        </div>
        <!-- RIGHT: Product information panel -->
        <div class="col-lg-6 col-md-6">
            <div class="product-info-panel p-4">
                <span class="badge bg-light text-dark border mb-3" th:text="${producto.categoria != null ? producto.categoria : ''}"></span>
                <h1 class="product-title" th:text="${producto.nombre != null ? producto.nombre : 'Producto'}">Nombre del producto</h1>
                <p class="product-price mb-4">$ <span th:text="${#numbers.formatInteger(producto.precio, 1)}"></span></p>
                <p class="text-muted small mb-3" th:if="${producto.stock != null}">Stock disponible: <span th:text="${producto.stock}"></span></p>
                <p class="product-description" th:text="${producto.descripcion != null ? producto.descripcion : ''}">Descripción</p>

                <div sec:authorize="hasRole('ADMIN')" class="product-admin-actions d-flex flex-wrap gap-2 mt-3 mb-4">
                    <a th:href="@{/productos/editar/{id}(id=${producto.id})}" class="btn btn-primary rounded-pill px-4">
                        Editar producto
                    </a>
                    <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}"
                       class="btn btn-outline-danger rounded-pill px-4"
                       onclick="return confirm('¿Eliminar este producto? Esta acción no se puede deshacer.');">
                        Eliminar producto
                    </a>
                </div>

                <form th:action="@{/carrito/agregar/{id}(id=${producto.id})}" method="post" class="mt-4">
                    <input type="hidden" name="volver" value="detalle">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill px-4 product-detail-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="me-2" viewBox="0 0 16 16">
                            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                        </svg>
                        Agregar al carrito
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
<script th:if="${flashSuccess}">
    document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('productoSuccessToast');
        if (el && typeof bootstrap !== 'undefined' && bootstrap.Toast) {
            var t = new bootstrap.Toast(el, { autohide: true, delay: 5000 });
            t.show();
        }
    });
</script>
</body>
</html>
