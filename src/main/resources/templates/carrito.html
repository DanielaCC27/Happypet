<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carrito - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
    <link rel="stylesheet" th:href="@{/css/cart-page.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light"
      th:with="authenticatedUi=${#authentication != null and #authentication.name != null and #authentication.name != 'anonymousUser'}"
      th:attr="data-authenticated=${authenticatedUi}">

<header th:replace="~{fragments/site-header :: header}"></header>

<main id="main-content" class="catalog-container flex-grow-1 py-4 mt-4 hp-cart-page">
    <header class="hp-cart-header mb-4">
        <p class="hp-cart-eyebrow text-uppercase small text-muted mb-1">Cesta</p>
        <h1 class="hp-cart-title h3 fw-bold mb-2">Tu carrito</h1>
        <p class="hp-cart-sub text-muted small mb-0">Revisa cantidades y el total antes de continuar al pago seguro.</p>
    </header>

    <div id="cart-empty-state" class="hp-cart-empty" role="status">
        <div class="hp-cart-empty__icon" aria-hidden="true">🐾</div>
        <h2 class="hp-cart-empty__title h5 fw-bold">Aún no hay productos aquí</h2>
        <p class="hp-cart-empty__text mb-4">Explora el catálogo y agrega lo que tu mascota necesita.</p>
        <a class="btn btn-primary hp-btn-cart-cta" th:href="@{/home}">Ir al catálogo</a>
    </div>

    <div id="cart-items-list" class="hp-cart-items mb-4" hidden></div>

    <div id="cart-summary-wrap" class="hp-cart-summary card border-0" hidden>
        <div class="hp-cart-summary__inner">
            <div class="hp-cart-summary__total-block">
                <p class="hp-cart-summary__label mb-0 small text-muted">Total estimado</p>
                <p class="hp-cart-summary__amount mb-0">$ <span id="cart-total-value">0</span></p>
            </div>
            <div class="hp-cart-summary__actions">
                <a class="btn btn-outline-primary hp-btn-cart-secondary" th:href="@{/home}">Seguir comprando</a>
                <button type="button" class="btn btn-success hp-btn-cart-checkout" id="cart-checkout-btn">Comprar</button>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
