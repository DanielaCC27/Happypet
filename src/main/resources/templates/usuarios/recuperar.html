<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar contraseña - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav class="navbar navbar-expand-lg global-nav">
    <div class="container-fluid hp-nav-container">
        <a class="navbar-brand fw-bold" th:href="@{/}">HappyPet 🐾</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">Tienda</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/carrito}">Carrito</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link active fw-semibold" th:href="@{/login}">Login</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/usuarios/perfil}">Mi Perfil</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/productos/nuevo}">Agregar producto</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="app-container d-flex flex-grow-1 justify-content-center py-5">
    <div class="form-card">
        <h2 class="section-title text-center">Recuperar contraseña</h2>
        <form id="form-recuperar-password"
              action="/usuarios/verificarCorreo"
              th:action="@{/usuarios/verificarCorreo}"
              method="post"
              data-verificar-url="/usuarios/verificarCorreo"
              th:attr="data-verificar-url=@{/usuarios/verificarCorreo}">
            <label class="text-label d-block">Correo electrónico</label>
            <input type="email" name="correo" required class="mb-3" autocomplete="email">
            <button type="submit" class="btn btn-primary w-100 rounded-pill mt-4">Continuar</button>
        </form>
        <div id="recuperar-error" class="mt-3 text-center text-danger" role="alert"><span th:if="${error}" th:text="${error}"></span></div>
        <p class="mt-4 text-center mb-0"><a th:href="@{/login}">Volver al login</a></p>
    </div>
</div>

<footer class="bg-light border-top mt-auto py-3">
    <div class="app-container text-center text-muted small">© HappyPet — Productos para tu mascota</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
(function() {
    document.addEventListener('DOMContentLoaded', function() {
        var form = document.getElementById('form-recuperar-password');
        if (!form) return;
        var errorEl = document.getElementById('recuperar-error');
        var url = form.getAttribute('data-verificar-url') || '/usuarios/verificarCorreo';

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (errorEl) errorEl.textContent = '';
            var btn = form.querySelector('button[type="submit"]');
            if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
            var body = new FormData(form);
            var req = new Request(url, {
                method: 'POST',
                body: body,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            fetch(req)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success && data.redirectUrl) {
                        window.location.href = data.redirectUrl;
                        return;
                    }
                    if (errorEl) errorEl.textContent = data.error || 'Error al verificar el correo.';
                })
                .catch(function() {
                    if (errorEl) errorEl.textContent = 'Error de conexión. Intenta de nuevo.';
                })
                .finally(function() {
                    if (btn) { btn.disabled = false; btn.textContent = 'Continuar'; }
                });
        });
    });
})();
</script>
</body>
</html>
