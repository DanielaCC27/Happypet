<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light"
      th:with="authenticatedUi=${#authentication != null and #authentication.name != null and #authentication.name != 'anonymousUser'}"
      th:attr="data-authenticated=${authenticatedUi}">
<header th:replace="~{fragments/site-header :: header}"></header>

<div id="main-content" class="app-container d-flex flex-grow-1 justify-content-center py-5">
    <div class="form-card">
        <h2 class="section-title text-center">Crear cuenta 🐾</h2>
        <p class="text-description text-center small mb-4">Completa el formulario con un correo válido. Te enviaremos un enlace de verificación.</p>
        <form id="register-form" th:action="@{/usuarios/registrar}" method="post">
            <label class="text-label d-block" for="nombre">Nombre completo</label>
            <input id="nombre" type="text" name="nombre" required class="hp-field-input mb-1" autocomplete="name"
                   maxlength="120" aria-describedby="nombre-error">
            <p id="nombre-error" class="hp-field-msg hp-field-msg--err mb-3" style="display: none;" role="alert"></p>

            <label class="text-label d-block" for="correo">Correo electrónico</label>
            <input id="correo" type="email" name="correo" required class="mb-3" autocomplete="email">

            <label class="text-label d-block" for="username">Usuario</label>
            <input id="username" type="text" name="username" required class="mb-3" autocomplete="username">

            <div class="hp-password-field">
                <label class="text-label d-block" for="password">Contraseña</label>
                <input id="password" type="password" name="password" required class="mb-0"
                       autocomplete="new-password" aria-describedby="pw-feedback pw-req-list">

                <div class="pw-strength-wrap">
                    <div class="pw-strength-track" aria-hidden="true">
                        <div id="pw-strength-fill" class="pw-strength-fill"></div>
                    </div>
                    <p id="pw-feedback" class="pw-feedback" role="status" aria-live="polite"></p>
                </div>

                <ul id="pw-req-list" class="pw-req-list">
                    <li class="pw-req pw-req--idle" data-rule="len">
                        <span class="pw-req-icon" aria-hidden="true"></span>
                        <span>Mínimo 8 caracteres</span>
                    </li>
                    <li class="pw-req pw-req--idle" data-rule="upper">
                        <span class="pw-req-icon" aria-hidden="true"></span>
                        <span>Al menos una letra mayúscula</span>
                    </li>
                    <li class="pw-req pw-req--idle" data-rule="lower">
                        <span class="pw-req-icon" aria-hidden="true"></span>
                        <span>Al menos una letra minúscula</span>
                    </li>
                    <li class="pw-req pw-req--idle" data-rule="digit">
                        <span class="pw-req-icon" aria-hidden="true"></span>
                        <span>Al menos un número</span>
                    </li>
                    <li class="pw-req pw-req--idle" data-rule="special">
                        <span class="pw-req-icon" aria-hidden="true"></span>
                        <span>Al menos un carácter especial (@ # $ % ^ &amp; + = !)</span>
                    </li>
                </ul>
            </div>

            <button id="register-submit" type="submit" class="btn btn-primary w-100 rounded-pill mt-4" disabled>
                Registrarse
            </button>
        </form>
        <div th:if="${error}" class="mt-3 text-center text-danger" th:text="${error}"></div>
        <div th:if="${success}" class="mt-3 text-center text-success" th:text="${success}"></div>
        <p class="mt-4 text-center mb-0"><a th:href="@{/login}">Volver al login</a></p>
    </div>
</div>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="text/javascript" th:src="@{/js/register-form.js}" defer></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
