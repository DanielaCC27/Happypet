<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav class="navbar navbar-expand-lg global-nav">
    <div class="container-fluid hp-nav-container">
        <a class="navbar-brand fw-bold" th:href="@{/}">HappyPet 🐾</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMain">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">Tienda</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/carrito}">Carrito</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link" th:href="@{/login}">Login</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" th:href="@{/usuarios/perfil}">Mi Perfil</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/productos/nuevo}">Agregar producto</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link text-danger" th:href="@{/logout}">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="app-container py-5">
    <div class="form-card">
        <h2 class="section-title">Mi Perfil</h2>
        <p class="mb-4"><strong>Usuario:</strong> <span th:text="${usuario.username}"></span></p>
        <form th:action="@{/usuarios/actualizar}" method="post">
            <input type="hidden" th:value="${usuario.id}" name="id">
            <label class="text-label d-block">Nombre</label>
            <input type="text" name="nombre" th:value="${usuario.nombre}" required class="mb-3">
            <label class="text-label d-block">Correo</label>
            <input type="email" name="correo" th:value="${usuario.correo}" required class="mb-3">
            <button type="submit" class="btn btn-primary rounded-pill mt-4">Actualizar información</button>
        </form>
    </div>
</div>

<footer class="bg-light border-top mt-auto py-3">
    <div class="app-container text-center text-muted small">© HappyPet — Productos para tu mascota</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
