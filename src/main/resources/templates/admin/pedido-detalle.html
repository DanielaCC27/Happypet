<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedido admin - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light"
      th:with="authenticatedUi=${#authentication != null and #authentication.name != null and #authentication.name != 'anonymousUser'}"
      th:attr="data-authenticated=${authenticatedUi}">
<header th:replace="~{fragments/site-header :: header}"></header>
<main id="main-content" class="catalog-container flex-grow-1 py-4 pb-5 hp-account-page" th:if="${pedido != null}">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <p class="small text-uppercase text-muted mb-1" style="letter-spacing: 0.06em;">Administraci&oacute;n</p>
    <h1 class="h4 fw-bold hp-profile-title mb-4">Pedido #<span th:text="${pedido.id}">0</span></h1>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <h2 class="h6 text-uppercase text-muted mb-3">Cliente y totales</h2>
            <p class="small text-muted mb-1">Correo</p>
            <p class="mb-3" th:text="${pedido.usuario != null ? pedido.usuario.correo : '-'}">-</p>
            <p class="mb-1"><strong>Estado:</strong> <span th:text="${pedido.estado}"></span></p>
            <p class="mb-0"><strong>Total:</strong> $<span th:text="${#numbers.formatInteger(pedido.total, 1)}"></span></p>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <h2 class="h6 text-uppercase text-muted mb-3">Env&iacute;o y entrega</h2>
            <p class="mb-2" th:text="${pedido.direccionEnvio}"></p>
            <p class="mb-1"><strong>Pago:</strong> <span th:text="${pedido.metodoPago != null ? pedido.metodoPago.etiqueta : '-'}"></span></p>
            <p class="mb-0"><strong>Entrega preferida:</strong>
                <span th:text="${pedido.fechaEntregaPreferida}"></span>
                &mdash;
                <span th:text="${pedido.horarioEntrega != null ? pedido.horarioEntrega.etiqueta : '-'}"></span>
            </p>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <h2 class="h6 text-uppercase text-muted mb-3">Cambiar estado</h2>
            <form th:action="@{|/admin/pedidos/${pedido.id}/estado|}" method="post" class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">Nuevo estado</label>
                    <select name="estado" class="form-select">
                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary rounded-pill w-100">Guardar estado</button>
                </div>
            </form>
        </div>
    </div>

    <div class="hp-admin-toolbar mb-4">
        <form th:action="@{|/admin/pedidos/${pedido.id}/confirmar|}" method="post">
            <button type="submit" class="btn btn-success rounded-pill w-100">Confirmar pedido (correo)</button>
        </form>
        <form th:action="@{|/admin/pedidos/${pedido.id}/eliminar|}" method="post"
              onsubmit="return confirm('Eliminar pedido?');">
            <button type="submit" class="btn btn-outline-danger rounded-pill w-100">Eliminar</button>
        </form>
    </div>

    <a th:href="@{/admin/pedidos}" class="btn btn-link px-0">Volver al listado</a>
</main>
<footer th:replace="~{fragments/site-footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
