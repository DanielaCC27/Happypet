<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:inline="none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pago - HappyPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light" data-authenticated="true">

<header th:replace="~{fragments/site-header :: header}"></header>

<main id="main-content" class="catalog-container flex-grow-1 py-4 pb-5">
    <nav class="small text-muted mb-2" aria-label="Pasos de compra">
        1. Entrega → <span class="fw-semibold text-dark">2. Pago</span> → 3. Facturación y envío
    </nav>
    <h1 class="h4 fw-bold mb-3">Método de pago</h1>
    <p class="text-muted small mb-4">Elige <strong>Efectivo</strong> o <strong>Transferencia bancaria</strong>.</p>

    <div class="row g-4">
        <div class="col-lg-7">
            <form th:action="@{/checkout/pago}" method="post" class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="mb-4">
                        <label class="form-label">Forma de pago</label>
                        <select name="metodoPago" class="form-select" required>
                            <option th:each="m : ${metodosPago}"
                                    th:value="${m}"
                                    th:selected="${checkoutSession.metodoPago eq m}"
                                    th:text="${m.etiqueta}">—</option>
                        </select>
                    </div>
                    <div class="hp-checkout-actions mt-2 pt-3 border-top">
                        <a class="btn btn-outline-secondary rounded-pill" th:href="@{/checkout/entrega}">Volver</a>
                        <button type="submit" class="btn btn-success rounded-pill">Continuar</button>
                    </div>
                </div>
            </form>
        </div>
        <div class="col-lg-5">
            <div th:replace="~{fragments/checkout-sidebar :: sidebar}"></div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/site-footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart.js}"></script>
</body>
</html>
