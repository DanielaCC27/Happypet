spring.application.name=happypet
spring.datasource.url=jdbc:postgresql://localhost:5432/happypet
spring.datasource.username=medicinaApp
spring.datasource.password=medicinaApp123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false

# Mostrar detalles del error 500 en la respuesta (para depurar)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Detrás de proxy (Render): usar headers X-Forwarded-* para URLs y redirects correctos
server.forward-headers-strategy=framework

# Enlaces en correos (verificación y reset). En producción usa tu dominio público.
app.mail.base-url=http://localhost:8080

# Correo (Gmail: usar contraseña de aplicación, no la de la cuenta)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
