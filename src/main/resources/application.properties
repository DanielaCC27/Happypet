spring.application.name=happypet
spring.datasource.url=jdbc:postgresql://localhost:5432/happypet
spring.datasource.username=medicinaApp
spring.datasource.password=medicinaApp123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
