spring.application.name=happypet

spring.datasource.url=jdbc:postgresql://localhost:5432/happypet
spring.datasource.username=medicinaApp
spring.datasource.password=medicinaApp123
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Debug: detalle de errores 500 en respuesta
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Detras de proxy: headers X-Forwarded-*
server.forward-headers-strategy=framework

# Public base URL for email links (verify, reset password). Local: mvnw spring-boot:run uses this.
# AWS: use profile aws; application-aws.properties overrides app.base-url.
app.base-url=http://localhost:8080

# SMTP Gmail (CONFIGURACION SEGURA PARA LOCAL)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=happypett14@gmail.com
spring.mail.password=fcrmoxzamnmkbdou
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8

# IMPORTANTE: debe coincidir con el username
app.mail.from=happypett14@gmail.com

# Solo desarrollo
app.mail.test-endpoint-enabled=true

# Tokens
app.email-verification-ttl-hours=24
app.password-reset-ttl-minutes=60